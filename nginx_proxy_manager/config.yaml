name: "Nginx Proxy Manager"
slug: "nginx_proxy_manager"
version: "2.15.1-2"
description: "Official Nginx Proxy Manager packaged as a Home Assistant app"
url: "https://github.com/tlamoureux24/haos_apps/tree/main/nginx_proxy_manager"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
apparmor: true
backup: cold
watchdog: "http://[HOST]:[PORT:81]/"

ports:
  80/tcp: 80
  81/tcp: 81
  443/tcp: 443
