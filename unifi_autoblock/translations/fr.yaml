configuration:
  unifi_base_url:
    name: URL UniFi
    description: URL locale du contrôleur UniFi. HTTPS est obligatoire, par exemple https://192.168.1.1.
  unifi_site_id:
    name: ID du site UniFi
    description: UUID optionnel du site. Laisser vide pour détection automatique si le contrôleur n'a qu'un seul site.
  traffic_matching_list_id:
    name: ID de la liste UniFi
    description: UUID optionnel de la liste UniFi IPv4 existante. Laisser vide pour détection par nom ou par liste IPv4 unique.
  traffic_matching_list_name:
    name: Nom de la liste UniFi
    description: Nom optionnel de la liste UniFi existante. Laisser vide si une seule liste IPv4 existe.
  unifi_api_key:
    name: Clé API UniFi
    description: Saisir ou renouveler la clé API UniFi. Elle sera chiffrée localement puis retirée de la configuration.
  verify_ssl:
    name: Vérifier le certificat TLS UniFi
    description: Active la vérification du certificat TLS du contrôleur UniFi. Garder false pour les certificats UniFi auto-signés.
  dry_run:
    name: Mode simulation
    description: Valide et journalise les événements sans modifier UniFi.
  allowed_destinations:
    name: IP des services protégés
    description: IP internes des services exposés à protéger, par exemple le reverse proxy. Vide accepte toute IP de destination.
  allowed_destination_ports:
    name: Ports des services protégés
    description: Ports des services exposés à protéger dans les événements IDS/IPS UniFi. Il s'agit du port attaqué, pas du port webhook de l'app.
  min_severity:
    name: Sévérité minimale
    description: Ignore les événements UniFi dont la sévérité est inférieure à cette valeur. Laisser 0 pour tout accepter.
  ban_ttl_days:
    name: Durée du bannissement
    description: Nombre de jours avant expiration des entrées gérées par l'app.
  allowlist_cidrs:
    name: CIDR en allowlist
    description: CIDR publics optionnels à ne jamais bloquer. Les IP locales, privées, loopback, link-local, multicast et réservées sont déjà ignorées automatiquement.
  log_level:
    name: Niveau de log
    description: Verbosité des logs de l'app.
network:
  37989/tcp: Port local utilisé pour recevoir les webhooks UniFi Alarm Manager.
