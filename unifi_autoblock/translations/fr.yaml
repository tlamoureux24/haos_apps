configuration:
  unifi_base_url:
    name: URL UniFi
    description: URL locale du controleur UniFi. HTTPS est obligatoire, par exemple https://192.168.1.1.
  unifi_site_id:
    name: ID du site UniFi
    description: UUID optionnel du site. Laisser vide pour detection automatique si le controleur n'a qu'un seul site.
  traffic_matching_list_id:
    name: ID de la liste UniFi
    description: UUID optionnel de la liste UniFi IPv4 existante. Laisser vide pour detection par nom ou par liste IPv4 unique.
  traffic_matching_list_name:
    name: Nom de la liste UniFi
    description: Nom optionnel de la liste UniFi existante. Laisser vide si une seule liste IPv4 existe.
  unifi_api_key:
    name: Cle API UniFi
    description: Cle API UniFi dediee pour lire et mettre a jour la liste configuree.
    description: Active la verification du certificat TLS du controleur UniFi. Garder false pour les certificats UniFi auto-signes.
  dry_run:
    name: Mode simulation
    description: Valide et journalise les evenements sans modifier UniFi.
  allowed_destinations:
    name: Destinations autorisees
    description: Liste optionnelle d'IP de destination. Vide accepte toute destination.
  allowed_destination_ports:
    name: Ports de destination autorises
    description: Ports de destination des evenements IDS/IPS UniFi. Il s agit du port du service attaque, pas du port webhook de l app.
  min_severity:
    name: Severite minimale
    description: Ignore les evenements sous cette severite UniFi.
  ban_ttl_days:
    name: Duree du bannissement
    description: Nombre de jours avant expiration des entrees gerees par l'app.
    name: Sources webhook autorisees
    description: CIDR optionnels autorises a appeler le webhook.
  allowlist_cidrs:
    name: CIDR en allowlist
    description: CIDR optionnels qui ne doivent jamais etre bloques.
  log_level:
    name: Niveau de log
    description: Verbosite des logs de l'app.
