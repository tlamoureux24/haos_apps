configuration:
  unifi_base_url:
    name: UniFi base URL
    description: Local UniFi controller URL. HTTPS is required, for example https://192.168.1.1.
  unifi_site_id:
    name: UniFi site ID
    description: Optional site UUID. Leave empty for auto-detection when the controller has exactly one site.
  traffic_matching_list_id:
    name: Traffic matching list ID
    description: Optional existing UniFi IPv4 address traffic matching list UUID. Leave empty to auto-detect by name or by the only IPv4 list.
  traffic_matching_list_name:
    name: Traffic matching list name
    description: Optional existing UniFi traffic matching list name. Leave empty when exactly one IPv4 list exists.
  unifi_api_key:
    name: UniFi API key
    description: Dedicated UniFi API key used to read and update the configured list.
  verify_ssl:
    name: Verify UniFi TLS certificate
    description: Enable TLS certificate verification for the UniFi controller. Keep false for self-signed UniFi certificates.
  dry_run:
    name: Dry run
    description: Validate and log events without writing changes to UniFi.
  allowed_destinations:
    name: Allowed destinations
    description: Optional destination IP list. Empty accepts any destination.
  allowed_destination_ports:
    name: Allowed destination ports
    description: UniFi event destination ports accepted from IDS/IPS events. This is the attacked service port, not the app webhook port.
  min_severity:
    name: Minimum severity
    description: Ignore UniFi events below this severity. Keep 0 to accept all severities.
  ban_ttl_days:
    name: Ban TTL days
    description: Number of days before app-managed entries expire.
  allowed_webhook_sources:
    name: Allowed webhook sources
    description: Optional CIDRs allowed to call the webhook, for example 192.168.1.1/32. Empty accepts any network source that knows the URL.
  allowlist_cidrs:
    name: Allowlist CIDRs
    description: Optional CIDRs that must never be blocked.
  log_level:
    name: Log level
    description: App log verbosity.
