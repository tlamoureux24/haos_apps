name: "UniFi Autoblock"
slug: "unifi_autoblock"
version: "0.4.7"
description: "Block IDS/IPS attacker IPs by updating a UniFi traffic matching list"
url: "https://github.com/tlamoureux24/haos_apps/tree/main/unifi_autoblock"
watchdog: "http://[HOST]:[PORT:37989]/health"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
apparmor: true
tmpfs: true
hassio_api: true
homeassistant_api: true
backup_exclude:
  - /data/unifi_api_key.key

ports:
  37989/tcp: 37989

options:
  unifi_base_url: ""
  unifi_site_id: ""
  traffic_matching_list_id: ""
  traffic_matching_list_name: ""
  unifi_api_key: ""
  verify_ssl: false
  dry_run: true
  allowed_destinations: []
  allowed_destination_ports:
    - 443
  min_severity: 0
  ban_ttl_days: 30
  allowlist_cidrs: []
  log_level: "info"

schema:
  unifi_base_url: str?
  unifi_site_id: str?
  traffic_matching_list_id: str?
  traffic_matching_list_name: str?
  unifi_api_key: password?
  verify_ssl: bool
  dry_run: bool
  allowed_destinations:
    - str
  allowed_destination_ports:
    - "int(1,65535)"
  min_severity: "int(0,10)"
  ban_ttl_days: "int(1,3650)"
  allowlist_cidrs:
    - str
  log_level: "list(debug|info|warning|error)"
