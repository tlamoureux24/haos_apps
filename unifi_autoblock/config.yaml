name: "UniFi Autoblock"
slug: "unifi_autoblock"
version: "0.2.0"
description: "Block IDS/IPS attacker IPs by updating a UniFi traffic matching list"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
apparmor: true
tmpfs: true

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Local UniFi Alarm Manager webhook endpoint"

options:
  unifi_base_url: null
  unifi_site_id: null
  traffic_matching_list_id: null
  traffic_matching_list_name: "Auto IDS Blocklist"
  unifi_api_key: null
  webhook_token: null
  verify_ssl: false
  dry_run: true
  allowed_destinations: []
  allowed_destination_ports:
    - 443
  min_severity: 0
  ban_ttl_days: 30
  max_new_blocks_per_hour: 20
  max_list_size: 1000
  allowed_webhook_sources: []
  allowlist_cidrs: []
  log_level: "info"

schema:
  unifi_base_url: url
  unifi_site_id: str?
  traffic_matching_list_id: str?
  traffic_matching_list_name: str
  unifi_api_key: password
  webhook_token: password
  verify_ssl: bool
  dry_run: bool
  allowed_destinations:
    - str
  allowed_destination_ports:
    - "int(1,65535)"
  min_severity: "int(0,10)"
  ban_ttl_days: "int(1,3650)"
  max_new_blocks_per_hour: "int(1,10000)"
  max_list_size: "int(1,100000)"
  allowed_webhook_sources:
    - str
  allowlist_cidrs:
    - str
  log_level: "list(debug|info|warning|error)"
