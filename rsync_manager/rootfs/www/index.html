<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rsync Manager Pro</title>
    <script>
        document.documentElement.dataset.theme = localStorage.getItem('rsync-manager-theme') || 'light';
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --app-bg: #f4f7f6;
            --app-surface: #ffffff;
            --app-surface-muted: #f8f9fa;
            --app-border: #dee2e6;
            --app-text: #212529;
            --app-muted: #6c757d;
            --app-footer-bg: rgba(255, 255, 255, 0.92);
            --app-footer-shadow: 0 -0.2rem 0.8rem rgba(15, 23, 42, 0.06);
            --app-hover-shadow: 0 0.25rem 0.75rem rgba(13, 110, 253, 0.08);
        }

        [data-theme="dark"] {
            --app-bg: #020817;
            --app-surface: #0f172a;
            --app-surface-muted: #111827;
            --app-border: #243044;
            --app-text: #e5edf8;
            --app-muted: #9aa8bd;
            --app-footer-bg: rgba(2, 8, 23, 0.94);
            --app-footer-shadow: 0 -0.2rem 0.9rem rgba(0, 0, 0, 0.28);
            --app-hover-shadow: 0 0.25rem 0.8rem rgba(96, 165, 250, 0.13);
        }

        body { background: var(--app-bg); color: var(--app-text); padding: 20px 20px 92px; transition: background-color 0.15s ease, color 0.15s ease; }
        .tab-content { background: var(--app-surface); padding: 25px; border-radius: 0 0 10px 10px; border: 1px solid var(--app-border); border-top: none; }
        .job-card { border: 1px solid var(--app-border); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: var(--app-surface-muted) !important; color: var(--app-text); }
        .job-card-clickable { cursor: pointer; transition: border-color 0.15s ease, box-shadow 0.15s ease; }
        .job-card-clickable:hover { border-color: #9ec5fe; box-shadow: var(--app-hover-shadow); }
        .job-card-disabled { opacity: 0.72; }
        .job-status-line { font-size: 0.82rem; }
        .job-log-view { max-height: 65vh; overflow: auto; white-space: pre-wrap; font-size: 0.8rem; }
        .text-secondary { color: var(--app-muted) !important; }
        .nav-tabs { border-bottom-color: var(--app-border); }
        .nav-tabs .nav-link { color: var(--app-muted); }
        .nav-tabs .nav-link.active { background: var(--app-surface); border-color: var(--app-border) var(--app-border) var(--app-surface); color: var(--app-text); }
        .modal-content { background: var(--app-surface); color: var(--app-text); border-color: var(--app-border); }
        .modal-header, .modal-footer { border-color: var(--app-border); }
        .form-control, .form-select { background-color: var(--app-surface); border-color: var(--app-border); color: var(--app-text); }
        .form-control:focus, .form-select:focus { background-color: var(--app-surface); color: var(--app-text); }
        .form-control::placeholder { color: var(--app-muted); opacity: 1; }
        [data-theme="dark"] .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        [data-theme="dark"] .btn-outline-dark { border-color: #94a3b8; color: #dbeafe; }
        [data-theme="dark"] .btn-outline-secondary { border-color: #64748b; color: #cbd5e1; }
        [data-theme="dark"] .alert-warning { background: #342806; border-color: #604a12; color: #fde68a; }
        .app-footer {
            align-items: center;
            backdrop-filter: blur(10px);
            background: var(--app-footer-bg);
            border-top: 1px solid var(--app-border);
            bottom: 0;
            box-shadow: var(--app-footer-shadow);
            color: var(--app-muted);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            left: 0;
            min-height: 68px;
            padding: 0 14px;
            position: fixed;
            right: 0;
            z-index: 1020;
        }
        .theme-toggle {
            align-items: center;
            background: var(--app-surface);
            border: 1px solid var(--app-border);
            border-radius: 999px;
            box-shadow: 0 0.25rem 0.75rem rgba(15, 23, 42, 0.08);
            color: var(--app-muted);
            display: inline-flex;
            gap: 2px;
            padding: 3px;
            width: max-content;
        }
        .theme-toggle button, .github-link {
            align-items: center;
            background: transparent;
            border: 0;
            border-radius: 999px;
            color: inherit;
            display: inline-flex;
            height: 34px;
            justify-content: center;
            width: 34px;
        }
        .theme-toggle button.active { background: #0d6efd; color: #fff; }
        .footer-title { color: var(--app-text); font-weight: 600; }
        .github-link { color: var(--app-muted); justify-self: end; text-decoration: none; }
        .github-link:hover { color: var(--app-text); }
        .icon { height: 18px; width: 18px; }
    </style>
</head>
<body>
<div class="container">
    <h3 class="mb-4 text-primary">Rsync Manager</h3>

<script>
let jobs = [];
let jobStatuses = {};
let editingJobId = null;
const API = 'cgi-bin/api.sh';
const statusTimers = {};

function setTheme(theme) {
    const safeTheme = theme === 'dark' ? 'dark' : 'light';
    document.documentElement.dataset.theme = safeTheme;
    localStorage.setItem('rsync-manager-theme', safeTheme);
    document.getElementById('theme-light-btn')?.classList.toggle('active', safeTheme === 'light');
    document.getElementById('theme-dark-btn')?.classList.toggle('active', safeTheme === 'dark');
}

function setStatus(message, type = 'info', target = 'email-status', autoHide = true) {
    const el = document.getElementById(target);
    clearTimeout(statusTimers[target]);

    el.className = `alert alert-${type} mt-3 d-none`;
    void el.offsetWidth;
    el.className = `alert alert-${type} mt-3`;
    el.textContent = message;

    if (autoHide) {
        statusTimers[target] = setTimeout(() => {
            el.className = `alert alert-${type} mt-3 d-none`;
            el.textContent = '';
        }, 5000);
    }
}

async function apiFetch(action, options = {}) {
    const res = await fetch(`${API}?action=${action}`, {
        cache: 'no-store',
        ...options
    });
    const text = await res.text();

    if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${text || res.statusText}`);
    }

    try {
        return JSON.parse(text);
    } catch (e) {
        throw new Error(`Réponse API non JSON pour ${action}: ${text.slice(0, 300)}`);
    }
}

function downloadJson(data, filename) {
    const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
}

function readJsonFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
            try {
                resolve(JSON.parse(reader.result));
            } catch (e) {
                reject(new Error('Fichier JSON invalide.'));
            }
        };
        reader.onerror = () => reject(new Error('Impossible de lire le fichier.'));
        reader.readAsText(file);
    });
}

function generateJobId() {
    const random = Math.random().toString(36).slice(2, 10);
    return `job_${Date.now()}_${random}`;
}

function ensureJobIds() {
    const seen = new Set();

    jobs = jobs.map(job => {
        let id = typeof job.id === 'string' && /^job_[A-Za-z0-9_-]+$/.test(job.id) ? job.id : '';
        if (!id || seen.has(id)) {
            id = generateJobId();
        }
        seen.add(id);
        return {
            ...job,
            id,
            enabled: job.enabled !== false,
            excludes: Array.isArray(job.excludes) ? job.excludes : []
        };
    });
}

async function load() {
    try {
        jobs = await apiFetch('list_jobs');
        ensureJobIds();
        jobStatuses = await apiFetch('get_status');
        const conf = await apiFetch('get_config');
        for (let k in conf) {
            let el = document.getElementById(k);
            if(el) el.type === 'checkbox' ? el.checked = conf[k] : el.value = conf[k];
        }
        render();
    } catch (e) {
        setStatus(e.message, 'danger', 'jobs-status');
    }
}

function escapeAttr(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function escapeHtml(value) {
    return escapeAttr(value).replace(/'/g, '&#039;');
}

function formatDate(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    return date.toLocaleString('fr-FR');
}

function formatDuration(seconds) {
    seconds = Number(seconds || 0);
    if (seconds < 60) return `${seconds}s`;
    const minutes = Math.floor(seconds / 60);
    const rest = seconds % 60;
    if (minutes < 60) return `${minutes}min ${rest}s`;
    const hours = Math.floor(minutes / 60);
    return `${hours}h ${minutes % 60}min ${rest}s`;
}

function statusBadgeClass(status) {
    if (status === 'success') return 'text-bg-success';
    if (status === 'failed' || status === 'mount_error') return 'text-bg-danger';
    return 'text-bg-secondary';
}

function modeLabel(mode) {
    if (mode === 'mount_test') return 'test montages';
    return mode === 'dry' ? 'dry-run' : 'run';
}

function triggerLabel(trigger) {
    return trigger === 'cron' ? 'cron' : 'manuel';
}

function jobStatusBlock(job) {
    const disabledBadge = job.enabled === false
        ? '<span class="badge text-bg-secondary">Désactivé</span>'
        : '';
    const status = jobStatuses[job.id];

    if (!status && job.enabled === false) {
        return `
            <div class="job-status-line mt-2 d-flex flex-wrap align-items-center gap-2">
                ${disabledBadge}
                <span class="text-secondary">La planification cron ignore ce job. Les actions manuelles restent possibles.</span>
                <button class="btn btn-sm btn-outline-dark ms-auto" type="button" onclick="event.stopPropagation(); showJobLog('${escapeAttr(job.id)}')">Voir dernier log</button>
            </div>`;
    }

    if (!status) {
        return `
            <div class="job-status-line mt-2 d-flex flex-wrap align-items-center gap-2">
                <span class="badge text-bg-secondary">Jamais exécuté</span>
                <button class="btn btn-sm btn-outline-dark ms-auto" type="button" onclick="event.stopPropagation(); showJobLog('${escapeAttr(job.id)}')">Voir dernier log</button>
            </div>`;
    }

    const summaryParts = [
        status.finished_at ? `Dernière exécution : ${formatDate(status.finished_at)}` : '',
        status.trigger ? triggerLabel(status.trigger) : '',
        status.mode ? modeLabel(status.mode) : '',
        Number.isFinite(Number(status.duration_seconds)) ? formatDuration(status.duration_seconds) : ''
    ].filter(Boolean);

    const rsyncParts = [
        status.bytes_sent ? `envoyé ${status.bytes_sent}` : '',
        status.bytes_received ? `reçu ${status.bytes_received}` : '',
        status.total_size ? `total ${status.total_size}` : ''
    ].filter(Boolean);

    return `
        <div class="job-status-line mt-2 d-flex flex-wrap align-items-center gap-2">
            ${disabledBadge}
            <span class="badge ${statusBadgeClass(status.status)}">${escapeHtml(status.label || 'Statut inconnu')}</span>
            <span class="text-secondary">${escapeHtml(summaryParts.join(' · '))}</span>
            ${rsyncParts.length ? `<span class="text-secondary">(${escapeHtml(rsyncParts.join(' · '))})</span>` : ''}
            <button class="btn btn-sm btn-outline-dark ms-auto" type="button" onclick="event.stopPropagation(); showJobLog('${escapeAttr(job.id)}')">Voir dernier log</button>
        </div>`;
}

function excludesText(job) {
    return (Array.isArray(job.excludes) ? job.excludes : []).join('\n');
}

function normalizeSide(side = {}) {
    if (typeof side === 'string') {
        return {
            type: 'local',
            path: side,
            host: '',
            share: '',
            subpath: '',
            domain: '',
            user: '',
            pass: ''
        };
    }

    let host = side.host || '';
    let share = side.share || '';
    let subpath = side.subpath || '';
    const path = side.path || '';

    if (side.type === 'cifs' && (!host || !share) && path.startsWith('//')) {
        const parts = path.replace(/^\/+/, '').split('/');
        host = host || parts.shift() || '';
        share = share || parts.shift() || '';
        subpath = subpath || parts.join('/');
    }

    if (side.type === 'cifs' && share.includes('/')) {
        const parts = share.replace(/^\/+/, '').split('/');
        if (host && parts[0] === host) parts.shift();
        share = parts.shift() || '';
        subpath = subpath || parts.join('/');
    }

    return {
        type: side.type || 'local',
        path,
        host,
        share,
        subpath,
        domain: side.domain || '',
        user: side.user || '',
        pass: side.pass || ''
    };
}

function defaultJob() {
    return {
        id: generateJobId(),
        enabled: true,
        excludes: [],
        name: "",
        cron: "",
        source: normalizeSide(),
        target: normalizeSide()
    };
}

function findJobIndex(jobId) {
    return jobs.findIndex(job => job.id === jobId);
}

async function persistJobs(successMessage = "Jobs enregistrés et planification cron mise à jour.") {
    ensureJobIds();
    const data = await apiFetch('save_jobs', {
        method:'POST',
        headers: {'Content-Type': 'application/json'},
        body:JSON.stringify(jobs)
    });
    if (data.status !== 'ok') throw new Error(data.error || 'Sauvegarde jobs refusée');
    jobs = await apiFetch('list_jobs');
    ensureJobIds();
    jobStatuses = await apiFetch('get_status');
    render();
    if (successMessage) setStatus(successMessage, 'success', 'jobs-status');
}

function setModalSide(sideName, side) {
    side = normalizeSide(side);
    document.getElementById(`job_${sideName}_type`).value = side.type;
    document.getElementById(`job_${sideName}_path`).value = side.path;
    document.getElementById(`job_${sideName}_host`).value = side.host;
    document.getElementById(`job_${sideName}_share`).value = side.share;
    document.getElementById(`job_${sideName}_subpath`).value = side.subpath;
    document.getElementById(`job_${sideName}_user`).value = side.user;
    document.getElementById(`job_${sideName}_pass`).value = side.pass;
    document.getElementById(`job_${sideName}_domain`).value = side.domain;
}

function getModalSide(sideName) {
    const type = document.getElementById(`job_${sideName}_type`).value;
    return normalizeSide({
        type,
        path: document.getElementById(`job_${sideName}_path`).value.trim(),
        host: document.getElementById(`job_${sideName}_host`).value.trim(),
        share: document.getElementById(`job_${sideName}_share`).value.trim(),
        subpath: document.getElementById(`job_${sideName}_subpath`).value.trim(),
        user: document.getElementById(`job_${sideName}_user`).value.trim(),
        pass: document.getElementById(`job_${sideName}_pass`).value,
        domain: document.getElementById(`job_${sideName}_domain`).value.trim()
    });
}

function updateModalSideVisibility() {
    ['source', 'target'].forEach(sideName => {
        const type = document.getElementById(`job_${sideName}_type`).value;
        document.getElementById(`job_${sideName}_local`).classList.toggle('d-none', type !== 'local');
        document.getElementById(`job_${sideName}_cifs`).classList.toggle('d-none', type !== 'cifs');
    });

    const hasCifs = document.getElementById('job_source_type').value === 'cifs'
        || document.getElementById('job_target_type').value === 'cifs';
    document.getElementById('modal-mount-test-btn').classList.toggle('d-none', !hasCifs);
}

function clearJobValidation() {
    document.querySelectorAll('#jobEditModal .is-invalid').forEach(el => el.classList.remove('is-invalid'));
    const message = document.getElementById('job-validation-message');
    message.classList.add('d-none');
    message.textContent = '';
}

function markJobFieldInvalid(id, label, errors) {
    const el = document.getElementById(id);
    if (el) el.classList.add('is-invalid');
    errors.push(label);
}

function validateJobModal() {
    const errors = [];
    clearJobValidation();

    if (!document.getElementById('job_name').value.trim()) {
        markJobFieldInvalid('job_name', 'Nom', errors);
    }

    if (!document.getElementById('job_cron').value.trim()) {
        markJobFieldInvalid('job_cron', 'Cron', errors);
    }

    ['source', 'target'].forEach(sideName => {
        const label = sideName === 'source' ? 'Source' : 'Cible';
        const type = document.getElementById(`job_${sideName}_type`).value;

        if (type === 'local') {
            if (!document.getElementById(`job_${sideName}_path`).value.trim()) {
                markJobFieldInvalid(`job_${sideName}_path`, `${label}: chemin local`, errors);
            }
            return;
        }

        if (!document.getElementById(`job_${sideName}_host`).value.trim()) {
            markJobFieldInvalid(`job_${sideName}_host`, `${label}: adresse IP ou nom`, errors);
        }
        if (!document.getElementById(`job_${sideName}_share`).value.trim()) {
            markJobFieldInvalid(`job_${sideName}_share`, `${label}: partage réseau`, errors);
        }
    });

    if (errors.length) {
        const message = document.getElementById('job-validation-message');
        message.textContent = `Champs obligatoires manquants : ${errors.join(', ')}.`;
        message.classList.remove('d-none');
        document.querySelector('#jobEditModal .is-invalid')?.scrollIntoView({block: 'nearest'});
        return false;
    }

    return true;
}

function modalJobFromFields() {
    return {
        id: editingJobId || generateJobId(),
        enabled: document.getElementById('job_enabled').checked,
        excludes: document.getElementById('job_excludes').value
            .split('\n')
            .map(line => line.trim())
            .filter(Boolean),
        name: document.getElementById('job_name').value.trim(),
        cron: document.getElementById('job_cron').value.trim(),
        source: getModalSide('source'),
        target: getModalSide('target')
    };
}

function fillJobModal(job, isNew) {
    editingJobId = job.id;
    document.getElementById('jobEditModalTitle').textContent = isNew ? 'Ajouter un job' : `Modifier : ${job.name || 'Job'}`;
    document.getElementById('job_name').value = job.name || '';
    document.getElementById('job_cron').value = job.cron || '';
    document.getElementById('job_enabled').checked = job.enabled !== false;
    document.getElementById('job_excludes').value = excludesText(job);
    setModalSide('source', job.source);
    setModalSide('target', job.target);
    document.getElementById('delete-job-btn').classList.toggle('d-none', isNew);
    clearJobValidation();
    updateModalSideVisibility();
}

function openJobModal(jobId = null) {
    const index = jobId ? findJobIndex(jobId) : -1;
    const job = index >= 0 ? jobs[index] : defaultJob();
    fillJobModal({
        ...job,
        source: normalizeSide(job.source),
        target: normalizeSide(job.target)
    }, index < 0);
    bootstrap.Modal.getOrCreateInstance(document.getElementById('jobEditModal')).show();
}

function render() {
    ensureJobIds();
    jobs = jobs.map(job => ({
        ...job,
        source: normalizeSide(job.source),
        target: normalizeSide(job.target)
    }));

    if (!jobs.length) {
        document.getElementById('jobsList').innerHTML = '<div class="text-secondary py-4">Aucun job créé.</div>';
        return;
    }

    document.getElementById('jobsList').innerHTML = jobs.map(j => `
        <div class="job-card job-card-clickable bg-light p-3 mb-3 border rounded ${j.enabled === false ? 'job-card-disabled' : ''}" onclick="openJobModal('${escapeAttr(j.id)}')">
            <div class="d-flex flex-wrap align-items-start gap-3">
                <div class="flex-grow-1">
                    <div class="fw-bold">${escapeHtml(j.name || 'Job sans nom')}</div>
                </div>
                <div class="form-check form-switch" onclick="event.stopPropagation()">
                    <input class="form-check-input" type="checkbox" ${j.enabled !== false ? 'checked' : ''} onchange="toggleJobEnabled('${escapeAttr(j.id)}', this.checked)">
                    <label class="form-check-label small fw-bold">${j.enabled !== false ? 'Actif' : 'Désactivé'}</label>
                </div>
            </div>
            ${jobStatusBlock(j)}
        </div>`).join('');
}

async function saveCurrentJob(closeModal = true) {
    try {
        if (!validateJobModal()) return null;
        const job = modalJobFromFields();
        const index = findJobIndex(job.id);
        if (index >= 0) {
            jobs[index] = job;
        } else {
            jobs.push(job);
        }
        await persistJobs("Job enregistré et planification cron mise à jour.");
        if (closeModal) {
            bootstrap.Modal.getOrCreateInstance(document.getElementById('jobEditModal')).hide();
        }
        return job;
    } catch (e) {
        setStatus(e.message, 'danger', 'jobs-status');
        return null;
    }
}

async function deleteCurrentJob() {
    const job = modalJobFromFields();
    if (!confirm(`Supprimer le job "${job.name}" ?`)) return;

    try {
        jobs = jobs.filter(item => item.id !== job.id);
        await persistJobs("Job supprimé et planification cron mise à jour.");
        bootstrap.Modal.getOrCreateInstance(document.getElementById('jobEditModal')).hide();
    } catch (e) {
        setStatus(e.message, 'danger', 'jobs-status');
    }
}

async function toggleJobEnabled(jobId, enabled) {
    const index = findJobIndex(jobId);
    if (index < 0) return;

    const previous = jobs[index].enabled;
    jobs[index].enabled = enabled;
    render();

    try {
        await persistJobs(enabled ? "Job activé." : "Job désactivé.");
    } catch (e) {
        jobs[index].enabled = previous;
        render();
        setStatus(e.message, 'danger', 'jobs-status');
    }
}

async function saveCurrentJobAndRun(mode) {
    const job = await saveCurrentJob(false);
    if (!job) return;
    await runJob(job.id, mode);
}

async function exportEmailConfig() {
    try {
        const conf = await apiFetch('get_config');
        downloadJson(conf, 'rsync-manager-email-config.json');
        setStatus("Export de la configuration email prêt.", 'success', 'management-status');
    } catch (e) {
        setStatus(e.message, 'danger', 'management-status');
    }
}

async function exportJobsConfig() {
    try {
        const exportedJobs = await apiFetch('list_jobs');
        downloadJson(exportedJobs, 'rsync-manager-jobs-config.json');
        setStatus("Export de la configuration jobs prêt.", 'success', 'management-status');
    } catch (e) {
        setStatus(e.message, 'danger', 'management-status');
    }
}

async function importEmailConfig(file) {
    try {
        const conf = await readJsonFile(file);
        if (!conf || Array.isArray(conf) || typeof conf !== 'object') {
            throw new Error('La configuration email doit être un objet JSON.');
        }

        const data = await apiFetch('save_config', {
            method:'POST',
            headers: {'Content-Type': 'application/json'},
            body:JSON.stringify(conf)
        });
        if (data.status !== 'ok') throw new Error(data.error || 'Import email refusé');

        await load();
        setStatus("Configuration email importée et prise en compte.", 'success', 'management-status');
    } catch (e) {
        setStatus(e.message, 'danger', 'management-status');
    }
}

async function importJobsConfig(file) {
    try {
        const importedJobs = await readJsonFile(file);
        if (!Array.isArray(importedJobs)) {
            throw new Error('La configuration jobs doit être un tableau JSON.');
        }

        const data = await apiFetch('save_jobs', {
            method:'POST',
            headers: {'Content-Type': 'application/json'},
            body:JSON.stringify(importedJobs)
        });
        if (data.status !== 'ok') throw new Error(data.error || 'Import jobs refusé');

        await load();
        setStatus("Configuration jobs importée, cron régénéré.", 'success', 'management-status');
    } catch (e) {
        setStatus(e.message, 'danger', 'management-status');
    }
}

async function saveConfig(showAlert = true) {
    try {
        const c = {}; document.querySelectorAll('#configPane input, #configPane select').forEach(el => { c[el.id] = el.type==='checkbox'?el.checked:el.value; });
        const data = await apiFetch('save_config', {
            method:'POST',
            headers: {'Content-Type': 'application/json'},
            body:JSON.stringify(c)
        });
        if (data.status !== 'ok') throw new Error(data.error || "Erreur sauvegarde inconnue");
        if (showAlert) setStatus("Configuration enregistrée.", 'success', 'email-status');
        return true;
    } catch (e) {
        setStatus(e.message, 'danger', 'email-status');
        return false;
    }
}
async function testEmail() {
    if (!await saveConfig(false)) return;
    setStatus("Test email en cours...", 'info', 'email-status');
    try {
        const data = await apiFetch('test_email');
        if (data.status === 'sent') {
            setStatus("Email de test envoyé.", 'success', 'email-status');
        } else {
            setStatus("Erreur envoi email : " + (data.error || "inconnue"), 'danger', 'email-status');
        }
    } catch (e) {
        setStatus(e.message, 'danger', 'email-status');
    }
}

async function showJobLog(jobId) {
    const job = jobs.find(j => j.id === jobId);
    document.getElementById('jobLogModalTitle').textContent = job?.name ? `Dernier log : ${job.name}` : 'Dernier log';
    document.getElementById('jobLogContent').textContent = 'Chargement...';
    const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('jobLogModal'));
    modal.show();

    try {
        const data = await apiFetch(`get_log&id=${encodeURIComponent(jobId)}`);
        if (data.status !== 'ok') throw new Error(data.error || 'Log indisponible');
        document.getElementById('jobLogContent').textContent = data.log || '';
    } catch (e) {
        document.getElementById('jobLogContent').textContent = e.message;
    }
}

async function runJob(i, m) {
    try {
        const res = await fetch(`${API}?action=${m}&id=${encodeURIComponent(i)}`, {cache: 'no-store'});
        const data = await res.json();
        if (data.status !== 'started') throw new Error(data.error || 'Action refusée');
        const action = m === 'dry' ? 'Dry-run' : (m === 'mount_test' ? 'Test montages' : 'Run manuel');
        const job = jobs.find(j => j.id === i);
        const name = job?.name ? ` pour ${job.name}` : '';
        setStatus(`${action}${name} lancé. Les logs détaillés sont disponibles dans le journal de l'addon.`, 'success', 'jobs-status');
        setTimeout(load, 2000);
    } catch (e) {
        setStatus(e.message, 'danger', 'jobs-status');
    }
}

document.getElementById('add-job-btn').addEventListener('click', () => openJobModal());
document.getElementById('refresh-jobs-btn').addEventListener('click', load);
document.getElementById('save-job-btn').addEventListener('click', () => saveCurrentJob(true));
document.getElementById('delete-job-btn').addEventListener('click', deleteCurrentJob);
document.getElementById('modal-mount-test-btn').addEventListener('click', () => saveCurrentJobAndRun('mount_test'));
document.getElementById('modal-dry-run-btn').addEventListener('click', () => saveCurrentJobAndRun('dry'));
document.getElementById('modal-run-btn').addEventListener('click', () => saveCurrentJobAndRun('run'));
document.getElementById('job_source_type').addEventListener('change', updateModalSideVisibility);
document.getElementById('job_target_type').addEventListener('change', updateModalSideVisibility);
document.querySelectorAll('#jobEditModal input, #jobEditModal textarea, #jobEditModal select').forEach(el => {
    el.addEventListener('input', () => {
        el.classList.remove('is-invalid');
        document.getElementById('job-validation-message').classList.add('d-none');
    });
    el.addEventListener('change', () => {
        el.classList.remove('is-invalid');
        document.getElementById('job-validation-message').classList.add('d-none');
    });
});
document.getElementById('save-config-btn').addEventListener('click', () => saveConfig(true));
document.getElementById('test-email-btn').addEventListener('click', testEmail);
document.getElementById('export-email-config-btn').addEventListener('click', exportEmailConfig);
document.getElementById('export-jobs-config-btn').addEventListener('click', exportJobsConfig);
document.getElementById('import-email-config-btn').addEventListener('click', () => document.getElementById('import-email-config-file').click());
document.getElementById('import-jobs-config-btn').addEventListener('click', () => document.getElementById('import-jobs-config-file').click());
document.getElementById('theme-light-btn').addEventListener('click', () => setTheme('light'));
document.getElementById('theme-dark-btn').addEventListener('click', () => setTheme('dark'));
document.getElementById('import-email-config-file').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (file) importEmailConfig(file);
});
document.getElementById('import-jobs-config-file').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (file) importJobsConfig(file);
});

setTheme(localStorage.getItem('rsync-manager-theme') || 'light');
load();
</script>
