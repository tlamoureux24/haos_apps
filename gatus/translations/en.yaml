configuration:
  sms_user:
    name: "Free Mobile SMS user"
    description: "Optional. Free Mobile API user, used only when the custom alert provider is enabled."
  sms_password:
    name: "Free Mobile SMS key"
    description: "Optional. Free Mobile API key, used only when the custom alert provider is enabled."
  email_from:
    name: "Email sender"
    description: "Optional. Address used in the From field when the email provider is enabled."
  email_username:
    name: "SMTP username"
    description: "Optional. SMTP username used when the email provider is enabled."
  email_password:
    name: "SMTP password"
    description: "Optional. Password or app password for the SMTP account."
  email_host:
    name: "SMTP server"
    description: "Optional. SMTP server hostname."
  email_port:
    name: "SMTP port"
    description: "Optional. Leave empty without email alerts, otherwise enter a port from 1 to 65535, such as 465 or 587."
  email_to:
    name: "Email recipient"
    description: "Optional. Address that will receive Gatus alerts."
  log_level:
    name: "Log level"
    description: "Gatus log verbosity."
network:
  8080/tcp: "Local Gatus web interface."
