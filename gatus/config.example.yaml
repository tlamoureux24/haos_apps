# Optional persistent history:
# storage:
#   type: sqlite
#   path: /data/gatus/gatus.db

concurrency: 0

web:
  port: 8080

ui:
  title: Home Network
  description: Monitoring network dashboard
  header: Network Status

alerting:
  custom:
    url: "https://smsapi.free-mobile.fr/sendmsg?user=${GATUS_SMS_USER}&pass=${GATUS_SMS_PASSWORD}&msg=Gatus%20:%20[ALERT_TRIGGERED_OR_RESOLVED]"
    method: "GET"
    default-alert:
      send-on-resolved: true
      failure-threshold: 2
      success-threshold: 2
    placeholders:
      ALERT_TRIGGERED_OR_RESOLVED:
        TRIGGERED: "hors ligne"
        RESOLVED: "en ligne"

  email:
    from: "${GATUS_EMAIL_FROM}"
    username: "${GATUS_EMAIL_USERNAME}"
    password: "${GATUS_EMAIL_PASSWORD}"
    host: "${GATUS_EMAIL_HOST}"
    port: ${GATUS_EMAIL_PORT}
    to: "${GATUS_EMAIL_TO}"
    default-alert:
      send-on-resolved: true
      failure-threshold: 2
      success-threshold: 2

# Add your own checks here. No endpoint is bundled with the App.
endpoints: []
